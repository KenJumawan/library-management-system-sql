<!DOCTYPE html>
<html>
        <head>
            <title>Customer Input Screen</title>
            <link rel="stylesheet" href="input.css">
        </head>
    <body>

        <!-- Header block -->
        <div class="header">
            <div class="left-header">
                <div class="logo"><img src="logo.png"></div>
                <h2>Orderly Oven</h2>
            </div>

            <div class="right-header">
                <div class="profile">Profile</div>
            </div>
        </div>

        <!-- Item Review block -->
        <div class="container">
            <div class="menu">
                <h2>Item Review</h2>
                <div class="grid">
                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>

                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>
                    <div class="item">Example item<br>Price</div>
                </div>
            </div>

            <!-- Checkout -->
            <div class="checkout">
                <h3>Checkout</h3>
                <p>Tip: 0.00</p>
                <p>Tax: 0.00</p>
                <p><b>Total Cost: $0.00</b></p>
                <div class="check-btn">
                    <button class="btn btn-continue">Submit</button>
                    <button class="btn btn-cancel">Cancel</button>
                </div>
            </div>
        </div>

    </body>
</html>
